services:
  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    image: smartlogix/discovery-service:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8761' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8761:8761"

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    image: smartlogix/inventory-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    ports:
      - "8081:8081"

  shipment-service:
    build:
      context: .
      dockerfile: shipment-service/Dockerfile
    image: smartlogix/shipment-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    ports:
      - "8083:8083"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: smartlogix/order-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8082' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "8092:8082"

  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    image: smartlogix/users-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8084' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    ports:
      - "8084:8084"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: smartlogix/auth-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWTTokenGeneration2024ChangeInProduction}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8085' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: smartlogix/api-gateway:latest
    depends_on:
      discovery-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    ports:
      - "8080:8080"
